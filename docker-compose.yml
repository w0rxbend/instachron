services:

  # ── Core stack ─────────────────────────────────────────────────────────────
  # tcp-camera-backend, camera-web-api, and ffmpeg-streamer all bind the same
  # unix socket via the shared "ipc" volume at /tmp/instachron/frames.sock.

  tcp-camera-backend:
    build:
      context: .
      dockerfile: services/tcp-camera-backend/Dockerfile
    ports:
      - "${TCP_PORT:-5000}:5000"
    volumes:
      - ipc:/tmp/instachron
    environment:
      TCP_ADDR: "0.0.0.0:5000"
      IPC_SOCKET_PATH: /tmp/instachron/frames.sock
    restart: unless-stopped

  camera-web-api:
    build:
      context: .
      dockerfile: services/camera-web-api/Dockerfile
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - ipc:/tmp/instachron
      # Uncomment to override the default cameras.json rotation config:
      # - ./services/camera-web-api/cameras.json:/app/cameras.json:ro
    environment:
      HTTP_ADDR: ":8080"
      IPC_SOCKET_PATH: /tmp/instachron/frames.sock
    depends_on:
      - tcp-camera-backend
    restart: unless-stopped

  # ── Restream layer ──────────────────────────────────────────────────────────

  camera-web-restreamer-api:
    build:
      context: .
      dockerfile: services/camera-web-restreamer-api/Dockerfile
    ports:
      - "${RESTREAMER_PORT:-8090}:8090"
    environment:
      HTTP_ADDR: ":8090"
      ORIGIN_URL: "http://camera-web-api:8080"
    depends_on:
      - camera-web-api
    restart: unless-stopped

  camera-web-restream-enhancer-api:
    build:
      context: .
      dockerfile: services/camera-web-restream-enhancer-api/Dockerfile
    ports:
      - "${ENHANCER_PORT:-8091}:8091"
    environment:
      HTTP_ADDR: ":8091"
      ORIGIN_URL: "http://camera-web-api:8080"
      SHARPEN: "${SHARPEN:-1.0}"
      DARK_THRESHOLD: "${DARK_THRESHOLD:-0.35}"
      BRIGHTNESS_MAX: "${BRIGHTNESS_MAX:-30.0}"
      CONTRAST_MAX: "${CONTRAST_MAX:-25.0}"
      JPEG_QUALITY: "${JPEG_QUALITY:-85}"
    depends_on:
      - camera-web-api
    restart: unless-stopped

  # ── Optional: Lanczos upscale restream transform ───────────────────────────
  # Activate with: docker compose --profile upscaler up

  camera-web-restream-upscaler-api:
    build:
      context: .
      dockerfile: services/camera-web-restream-upscaler-api/Dockerfile
    ports:
      - "${UPSCALER_PORT:-8092}:8092"
    environment:
      HTTP_ADDR: ":8092"
      JPEG_QUALITY: "${UPSCALER_JPEG_QUALITY:-85}"
      NUM_WORKERS: "${UPSCALER_WORKERS:-}"
      UPSCALE_FACTOR: "${UPSCALE_FACTOR:-2}"
      QUEUE_MULTIPLIER: "${QUEUE_MULTIPLIER:-1}"
      MAX_INPUT_WIDTH: "${MAX_INPUT_WIDTH:-640}"
      MAX_INPUT_HEIGHT: "${MAX_INPUT_HEIGHT:-360}"
      METRICS_INTERVAL_SEC: "${METRICS_INTERVAL_SEC:-60}"
    depends_on:
      - camera-web-api
    profiles:
      - upscaler
    restart: unless-stopped

  # ── Optional: ffmpeg RTMP streamer ──────────────────────────────────────────
  # Requires a stream destination. Set exactly one of:
  #   TWITCH_STREAM_KEY, YOUTUBE_STREAM_KEY, STREAM_URL, or RTMP_URL
  # Activate with: docker compose --profile streaming up

  ffmpeg-streamer:
    build:
      context: .
      dockerfile: services/ffmpeg-streamer/Dockerfile
    volumes:
      - ipc:/tmp/instachron
    environment:
      IPC_SOCKET_PATH: /tmp/instachron/frames.sock
      STREAM_URL: "${STREAM_URL:-}"
      RTMP_URL: "${RTMP_URL:-}"
      TWITCH_STREAM_KEY: "${TWITCH_STREAM_KEY:-}"
      YOUTUBE_STREAM_KEY: "${YOUTUBE_STREAM_KEY:-}"
      CAMERA_ID: "${CAMERA_ID:-0}"
      MERGE_ALL: "${MERGE_ALL:-false}"
      FFMPEG_PATH: "${FFMPEG_PATH:-ffmpeg}"
      STREAM_FRAME_RATE: "${STREAM_FRAME_RATE:-10}"
      FFMPEG_RESTART_DELAY: "${FFMPEG_RESTART_DELAY:-5s}"
      CELL_WIDTH: "${CELL_WIDTH:-320}"
      CELL_HEIGHT: "${CELL_HEIGHT:-240}"
    depends_on:
      - tcp-camera-backend
    profiles:
      - streaming
    restart: unless-stopped

volumes:
  # Shared unix socket directory for tcp-camera-backend, camera-web-api,
  # and ffmpeg-streamer. The socket file lives at /tmp/instachron/frames.sock.
  ipc:
